name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install analysis test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pytest

      - name: Run analysis tests
        run: pytest analysis/tests -q

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint -- --max-warnings=0

      - name: Run tests
        run: bun run test:run

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Run E2E image tests
        run: bunx playwright test tests/e2e/images.spec.js --project=chromium

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test deployed site
        run: |
          sleep 30
          URL="https://policyengine.github.io/${{ github.event.repository.name }}/"
          STATUS=$(curl -s -o /tmp/page.html -w "%{http_code}" "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Site returned $STATUS"
            exit 1
          fi
          if ! grep -q "/${{ github.event.repository.name }}/_next/static/" /tmp/page.html; then
            echo "ERROR: Asset paths don't match repo name"
            cat /tmp/page.html
            exit 1
          fi
          echo "Smoke test passed: $URL returned 200 with correct asset paths"
